<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Loftare Studio</title>
  <meta name="description" content="Book a discovery call or send a message. We'll cover your current platform situation and whether a Loftare platform is the right fit.">
  <link rel="canonical" href="https://loftare.studio/contact">

  <meta property="og:title" content="Contact — Loftare Studio">
  <meta property="og:description" content="Book a discovery call. 30 minutes. We'll cover your platform situation and whether Loftare is the right fit.">
  <meta property="og:url" content="https://loftare.studio/contact">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap"></noscript>
  <link rel="stylesheet" href="/css/styles.min.css">
</head>
<body>

<div id="nav-placeholder"></div>

<!-- Hero -->
<div class="contact-hero">
  <p class="eyebrow reveal" style="margin-bottom:20px; color:var(--ember)">Let&rsquo;s talk</p>
  <h1 class="display display-md reveal" style="transition-delay:100ms">Tell us about your property.</h1>
  <p class="reveal" style="transition-delay:200ms">A discovery call is 30 minutes. We&rsquo;ll cover your current platform situation, what direct booking would mean for your property, and whether a Loftare platform is the right fit.</p>
</div>

<!-- Contact body -->
<section class="section-contact-body">
  <div class="contact-form-wrap section-inner">

    <form class="contact-form" id="contact-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="name">Name</label>
        <input class="form-input" type="text" id="name" name="name" required placeholder="Your name">
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label" for="property">Property / location <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>
        <input class="form-input" type="text" id="property" name="property" placeholder="e.g. Vail, Colorado">
      </div>
      <div class="form-group">
        <label class="form-label" for="message">Message</label>
        <textarea class="form-textarea" id="message" name="message" rows="5" required placeholder="Tell us about your property and what you're looking to build."></textarea>
      </div>
      <button type="submit" class="btn btn-primary form-submit">Send message &rarr;</button>
    </form>

    <p class="demo-note" style="text-align:center;margin-top:20px">We respond to every inquiry within 24 hours.</p>

  </div>
</section>

<div id="footer-placeholder"></div>
<script src="/js/main.js" defer></script>
</body>
</html>
